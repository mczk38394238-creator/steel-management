<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>望月鉄工所 鋼材管理システム</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Meiryo', sans-serif; background: #f5f5f5; }
.header { background: #1a3a5c; color: white; padding: 12px 20px; font-size: 18px; font-weight: bold; }
.nav { background: #2c5f8a; display: flex; gap: 4px; padding: 8px 20px; }
.nav button { background: transparent; color: #aac; border: 1px solid #4a8; padding: 6px 16px; cursor: pointer; border-radius: 4px; font-size: 14px; }
.nav button.active { background: #1a3a5c; color: white; border-color: #1a3a5c; }
.content { padding: 20px; }
.page { display: none; }
.page.active { display: block; }
h2 { margin-bottom: 16px; font-size: 18px; color: #333; }
.btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
.btn-primary { background: #1a3a5c; color: white; }
.btn-secondary { background: #6c757d; color: white; font-size: 12px; padding: 4px 10px; }
.btn-danger { background: #dc3545; color: white; font-size: 12px; padding: 4px 10px; }
.btn-success { background: #28a745; color: white; font-size: 12px; padding: 4px 10px; }
table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
th { background: #1a3a5c; color: white; padding: 8px 6px; text-align: left; white-space: nowrap; }
td { padding: 6px; border-bottom: 1px solid #ddd; white-space: nowrap; }
tr:hover { background: #f0f4f8; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
.modal.open { display: flex; align-items: center; justify-content: center; }
.modal-box { background: white; padding: 24px; border-radius: 8px; min-width: 360px; max-width: 560px; width: 90%; max-height: 90vh; overflow-y: auto; }
.modal-box h3 { margin-bottom: 16px; font-size: 16px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; margin-bottom: 4px; font-size: 13px; color: #555; font-weight: bold; }
.form-group input, .form-group select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.note { background: #fff3cd; border: 1px solid #ffc107; padding: 8px 12px; border-radius: 4px; font-size: 13px; margin-bottom: 12px; }
.project-selector { background: white; padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.project-selector label { font-weight: bold; color: #333; }
.project-selector select { padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; min-width: 280px; }
.table-wrap { overflow-x: auto; }
.arrived { color: #28a745; font-weight: bold; }
.pending { color: #dc3545; font-weight: bold; }
.msg-error { color: #dc3545; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="header">望月鉄工所 鋼材管理システム</div>
<div class="nav">
  <button class="active" onclick="showPage('master', this)">物件マスター</button>
  <button onclick="showPage('zaizai', this)">資材部管理</button>
</div>
<div class="content">

<!-- 物件マスター -->
<div id="page-master" class="page active">
  <h2>物件マスター</h2>
  <button class="btn btn-primary" id="btnNewProject" style="margin-bottom:12px">＋ 新規物件登録</button>
  <div class="table-wrap">
  <table>
    <thead><tr>
      <th>No</th><th>物件コード</th><th>物件名</th><th>得意先名</th><th>登録日</th><th>操作</th>
    </tr></thead>
    <tbody id="projectBody">
      <tr><td colspan="6" style="text-align:center;color:#999;padding:20px;">読み込み中...</td></tr>
    </tbody>
  </table>
  </div>
</div>

<!-- 資材部管理 -->
<div id="page-zaizai" class="page">
  <h2>資材部管理画面</h2>
  <div class="note">※ 規格部「-T」は高規格材とする（弊社独自規定）</div>
  <div class="project-selector">
    <label>物件選択：</label>
    <select id="projectSelect" onchange="loadOrderItems()">
      <option value="">-- 物件を選択してください --</option>
    </select>
    <button class="btn btn-primary" onclick="openAddItemModal()" id="addItemBtn" style="display:none">＋ 明細追加</button>
  </div>
  <div class="table-wrap">
  <table>
    <thead><tr>
      <th>通しNo</th><th>商社</th><th>メーカー</th><th>暫定納期</th><th>工区部位</th>
      <th>契約No</th><th>鋼種</th><th>サイズ</th><th>規格</th><th>長さ</th>
      <th>員数</th><th>重量</th><th>向け先</th><th>入荷本数</th><th>未入荷本数</th>
      <th>備考</th><th>操作</th>
    </tr></thead>
    <tbody id="orderBody"></tbody>
  </table>
  </div>
</div>

</div>

<!-- 物件登録モーダル -->
<div id="addModal" class="modal">
<div class="modal-box">
  <h3 id="addModalTitle">新規物件登録</h3>
  <input type="hidden" id="editId">
  <div class="form-group">
    <label>物件コード</label>
    <input id="f_code" type="text" placeholder="例：2024-001">
  </div>
  <div class="form-group">
    <label>物件名 <span style="color:red">*</span></label>
    <input id="f_name" type="text" placeholder="物件名を入力">
  </div>
  <div class="form-group">
    <label>得意先名</label>
    <input id="f_client" type="text" placeholder="得意先名を入力">
  </div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModal('addModal')">キャンセル</button>
    <button class="btn btn-primary" onclick="saveProject()">保存</button>
  </div>
</div>
</div>

<!-- 明細追加モーダル -->
<div id="addItemModal" class="modal">
<div class="modal-box">
  <h3 id="itemModalTitle">明細追加</h3>
  <input type="hidden" id="editItemId">
  <div class="form-row">
    <div class="form-group"><label>通しNo</label><input id="i_seq" type="text"></div>
    <div class="form-group"><label>商社</label><input id="i_trading" type="text"></div>
    <div class="form-group"><label>メーカー</label><input id="i_maker" type="text"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>暫定納期</label><input id="i_delivery" type="date"></div>
    <div class="form-group"><label>工区部位</label><input id="i_section" type="text"></div>
    <div class="form-group"><label>契約No</label><input id="i_contract" type="text"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>鋼種</label><input id="i_steel" type="text"></div>
    <div class="form-group"><label>サイズ</label><input id="i_size" type="text"></div>
    <div class="form-group"><label>規格</label><input id="i_standard" type="text"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>長さ(mm)</label><input id="i_length" type="text"></div>
    <div class="form-group"><label>員数</label><input id="i_qty" type="text"></div>
    <div class="form-group"><label>重量(kg)</label><input id="i_weight" type="text"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>向け先</label><input id="i_dest" type="text"></div>
    <div class="form-group"><label>入荷本数</label><input id="i_arrived" type="text" value="0"></div>
    <div class="form-group"><label>未入荷本数</label><input id="i_pending" type="text" value="0"></div>
  </div>
  <div class="form-group"><label>備考</label><input id="i_note" type="text"></div>
  <div class="modal-footer">
    <button class="btn btn-secondary" onclick="closeModal('addItemModal')">キャンセル</button>
    <button class="btn btn-primary" onclick="saveItem()">保存</button>
  </div>
</div>
</div>

<script>
// ===== ページ切り替え =====
function showPage(page, btn) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.nav button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('page-' + page).classList.add('active');
  if (btn) btn.classList.add('active');
  if (page === 'zaizai') loadProjectSelector();
}

// ===== モーダル =====
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

// モーダル外クリックで閉じる
document.querySelectorAll('.modal').forEach(function(m) {
  m.addEventListener('click', function(e) {
    if (e.target === m) m.classList.remove('open');
  });
});

// ===== 物件マスター =====

// 新規登録ボタン（addEventListener使用で確実に動作）
document.getElementById('btnNewProject').addEventListener('click', function() {
  document.getElementById('addModalTitle').textContent = '新規物件登録';
  document.getElementById('editId').value = '';
  document.getElementById('f_code').value = '';
  document.getElementById('f_name').value = '';
  document.getElementById('f_client').value = '';
  document.getElementById('addModal').classList.add('open');
});

function openEditModal(p) {
  document.getElementById('addModalTitle').textContent = '物件編集';
  document.getElementById('editId').value = p.id;
  document.getElementById('f_code').value = p.project_code || '';
  document.getElementById('f_name').value = p.project_name || '';
  document.getElementById('f_client').value = p.client_name || '';
  document.getElementById('addModal').classList.add('open');
}

async function saveProject() {
  var id = document.getElementById('editId').value;
  var projectName = document.getElementById('f_name').value.trim();
  if (!projectName) {
    alert('物件名を入力してください');
    return;
  }
  var body = {
    project_code: document.getElementById('f_code').value.trim(),
    project_name: projectName,
    client_name: document.getElementById('f_client').value.trim()
  };
  if (!id) body.status = 'active';
  var url = id ? '/api/projects/' + id : '/api/projects';
  var method = id ? 'PUT' : 'POST';
  try {
    var res = await fetch(url, {
      method: method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.ok) {
      closeModal('addModal');
      loadProjects();
    } else {
      var err = await res.json();
      alert('保存失敗: ' + (err.error || '不明なエラー'));
    }
  } catch (e) {
    alert('通信エラー: ' + e.message);
  }
}

async function archiveProject(id, name) {
  if (!confirm('「' + name + '」を完了にしますか？\n完了にすると一覧から非表示になります。')) return;
  try {
    var res = await fetch('/api/projects/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: 'archived' })
    });
    if (res.ok) {
      loadProjects();
    } else {
      alert('更新失敗');
    }
  } catch (e) {
    alert('通信エラー: ' + e.message);
  }
}

async function loadProjects() {
  var tbody = document.getElementById('projectBody');
  try {
    var res = await fetch('/api/projects');
    if (!res.ok) {
      var err = await res.json();
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#dc3545;padding:20px;">エラー: ' + (err.error || 'サーバーエラー') + '</td></tr>';
      return;
    }
    var data = await res.json();
    if (!Array.isArray(data) || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;padding:20px;">物件データがありません</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(function(p, i) {
      var createdAt = p.created_at ? p.created_at.slice(0, 10) : '';
      var safeName = (p.project_name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
      return '<tr>' +
        '<td>' + (i + 1) + '</td>' +
        '<td>' + (p.project_code || '') + '</td>' +
        '<td>' + (p.project_name || '') + '</td>' +
        '<td>' + (p.client_name || '') + '</td>' +
        '<td>' + createdAt + '</td>' +
        '<td>' +
          '<button class="btn btn-secondary" onclick=\'openEditModal(' + JSON.stringify(p) + ')\'>編集</button> ' +
          '<button class="btn btn-success" onclick="archiveProject(' + p.id + ',\'' + safeName + '\')">完了</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#dc3545;padding:20px;">サーバーに接続できません。サーバーを起動してください。</td></tr>';
  }
}

// ===== 資材部管理 =====
var currentProjectId = null;

async function loadProjectSelector() {
  try {
    var res = await fetch('/api/projects');
    if (!res.ok) return;
    var data = await res.json();
    if (!Array.isArray(data)) return;
    var sel = document.getElementById('projectSelect');
    sel.innerHTML = '<option value="">-- 物件を選択してください --</option>' +
      data.map(function(p) { return '<option value="' + p.id + '">' + (p.project_name || '') + '</option>'; }).join('');
  } catch (e) {}
}

async function loadOrderItems() {
  var sel = document.getElementById('projectSelect');
  currentProjectId = sel.value;
  var addBtn = document.getElementById('addItemBtn');
  var tbody = document.getElementById('orderBody');
  if (!currentProjectId) {
    tbody.innerHTML = '';
    addBtn.style.display = 'none';
    return;
  }
  addBtn.style.display = 'inline-block';
  try {
    var res = await fetch('/api/order-items/' + currentProjectId);
    var data = await res.json();
    if (!Array.isArray(data) || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="17" style="text-align:center;color:#999;">明細データがありません</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(function(d) {
      var arrived = d.arrived_qty || 0;
      var pending = d.pending_qty || 0;
      var delivery = d.tentative_delivery ? d.tentative_delivery.slice(0, 10) : '';
      return '<tr>' +
        '<td>' + (d.tsushi_no || '') + '</td>' +
        '<td>' + (d.trading_company || '') + '</td>' +
        '<td>' + (d.maker || '') + '</td>' +
        '<td>' + delivery + '</td>' +
        '<td>' + (d.section || '') + '</td>' +
        '<td>' + (d.contract_no || '') + '</td>' +
        '<td>' + (d.steel_type || '') + '</td>' +
        '<td>' + (d.size || '') + '</td>' +
        '<td>' + (d.standard || '') + '</td>' +
        '<td>' + (d.length_mm || '') + '</td>' +
        '<td>' + (d.qty || '') + '</td>' +
        '<td>' + (d.weight_kg || '') + '</td>' +
        '<td>' + (d.destination || '') + '</td>' +
        '<td class="arrived">' + arrived + '</td>' +
        '<td class="pending">' + pending + '</td>' +
        '<td>' + (d.note || '') + '</td>' +
        '<td>' +
          '<button class="btn btn-secondary" onclick=\'openEditItemModal(' + JSON.stringify(d) + ')\'>編集</button> ' +
          '<button class="btn btn-danger" onclick="deleteItem(' + d.id + ')">削除</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="17" style="text-align:center;color:#dc3545;">読み込みエラー</td></tr>';
  }
}

function openAddItemModal() {
  document.getElementById('itemModalTitle').textContent = '明細追加';
  document.getElementById('editItemId').value = '';
  ['i_seq','i_trading','i_maker','i_section','i_contract','i_steel','i_size','i_standard','i_length','i_qty','i_weight','i_dest','i_note'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  document.getElementById('i_delivery').value = '';
  document.getElementById('i_arrived').value = '0';
  document.getElementById('i_pending').value = '0';
  document.getElementById('addItemModal').classList.add('open');
}

function openEditItemModal(d) {
  document.getElementById('itemModalTitle').textContent = '明細編集';
  document.getElementById('editItemId').value = d.id;
  document.getElementById('i_seq').value = d.tsushi_no || '';
  document.getElementById('i_trading').value = d.trading_company || '';
  document.getElementById('i_maker').value = d.maker || '';
  document.getElementById('i_delivery').value = d.tentative_delivery ? d.tentative_delivery.slice(0,10) : '';
  document.getElementById('i_section').value = d.section || '';
  document.getElementById('i_contract').value = d.contract_no || '';
  document.getElementById('i_steel').value = d.steel_type || '';
  document.getElementById('i_size').value = d.size || '';
  document.getElementById('i_standard').value = d.standard || '';
  document.getElementById('i_length').value = d.length_mm || '';
  document.getElementById('i_qty').value = d.qty || '';
  document.getElementById('i_weight').value = d.weight_kg || '';
  document.getElementById('i_dest').value = d.destination || '';
  document.getElementById('i_arrived').value = d.arrived_qty || 0;
  document.getElementById('i_pending').value = d.pending_qty || 0;
  document.getElementById('i_note').value = d.note || '';
  document.getElementById('addItemModal').classList.add('open');
}

async function saveItem() {
  var id = document.getElementById('editItemId').value;
  var body = {
    project_id: currentProjectId,
    tsushi_no: document.getElementById('i_seq').value,
    trading_company: document.getElementById('i_trading').value,
    maker: document.getElementById('i_maker').value,
    tentative_delivery: document.getElementById('i_delivery').value || null,
    section: document.getElementById('i_section').value,
    contract_no: document.getElementById('i_contract').value,
    steel_type: document.getElementById('i_steel').value,
    size: document.getElementById('i_size').value,
    standard: document.getElementById('i_standard').value,
    length_mm: document.getElementById('i_length').value || null,
    qty: document.getElementById('i_qty').value || null,
    weight_kg: document.getElementById('i_weight').value || null,
    destination: document.getElementById('i_dest').value,
    arrived_qty: parseInt(document.getElementById('i_arrived').value) || 0,
    pending_qty: parseInt(document.getElementById('i_pending').value) || 0,
    note: document.getElementById('i_note').value
  };
  var url = id ? '/api/order-items/' + id : '/api/order-items';
  var method = id ? 'PUT' : 'POST';
  try {
    var res = await fetch(url, { method: method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    if (res.ok) { closeModal('addItemModal'); loadOrderItems(); }
    else { var err = await res.json(); alert('保存失敗: ' + (err.error || '不明なエラー')); }
  } catch (e) {
    alert('通信エラー: ' + e.message);
  }
}

async function deleteItem(id) {
  if (!confirm('この明細を削除しますか？')) return;
  try {
    var res = await fetch('/api/order-items/' + id, { method: 'DELETE' });
    if (res.ok) loadOrderItems();
    else alert('削除失敗');
  } catch (e) {
    alert('通信エラー: ' + e.message);
  }
}

// 起動時に物件一覧を読み込む
loadProjects();
</script>
</body>
</html>
